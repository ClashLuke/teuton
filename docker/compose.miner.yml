# Miner host stack: one teuton:miner container (1 GPU) + Watchtower.
#
# Deployed to a Lium remote by scripts/provision_miner.sh which:
#   1. installs docker + nvidia-container-toolkit
#   2. scp's the assigned hotkey to /root/.bittensor/wallets/teuton_mining/hotkeys/
#   3. writes /root/teuton/.env with the per-host values
#   4. docker login (PAT piped from Doppler)
#   5. docker compose -f compose.miner.yml up -d
#
# Required env on the remote (via /root/teuton/.env or image bake):
#   DOCKER_USER, MINER_HOTKEY_NAME (or MINER_HOTKEY)
#
# Optional env:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  (operator/internal deployments
#       only; third-party miners normally use anonymous bucket access plus
#       encrypted presigned grants)
#   TEUTON_AUDIT_ELIGIBLE_HOTKEYS  (CSV of SS58s; if MINER_HOTKEY_SS58 appears
#       in this list, the miner also picks up audit_replay jobs assigned
#       to it from the bucket, in addition to its normal training work)
#
# RUN_ID is optional here: when unset, the image's baked TEUTON_BAKED_RUN_ID
# (set at `docker build --build-arg TEUTON_RUN_ID=...`) is used. Set RUN_ID
# in /root/teuton/.env only when you need a per-host override.
name: teuton-miner

services:
  miner:
    image: ${DOCKER_USER}/teuton:miner
    container_name: teuton-miner
    restart: always
    pull_policy: always
    runtime: nvidia
    environment:
      TEUTON_ROLE: miner
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      TEUTON_OWNER_HOTKEY: ${TEUTON_OWNER_HOTKEY:-}
      TEUTON_ASSIGNMENT_CRYPTO: ${TEUTON_ASSIGNMENT_CRYPTO:-ed25519}
      TEUTON_AUDIT_ELIGIBLE_HOTKEYS: ${TEUTON_AUDIT_ELIGIBLE_HOTKEYS:-}
      # Optional runtime override of the run id. Empty/unset falls back to
      # the image-baked TEUTON_BAKED_RUN_ID (resolved in entrypoint.sh).
      TEUTON_RUN_ID: ${TEUTON_RUN_ID:-${RUN_ID:-}}
      BT_WALLET_PATH: /root/.bittensor/wallets
      BT_WALLET_NAME: ${MINER_COLDKEY:-${MINER_WALLET_NAME:-teuton_mining}}
      BT_HOTKEY_NAME: ${MINER_HOTKEY:-${MINER_HOTKEY_NAME}}
    volumes:
      - /root/.bittensor/wallets:/root/.bittensor/wallets:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower:latest
    container_name: teuton-miner-watchtower
    restart: always
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "60"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_TIMEOUT: "30s"
      DOCKER_API_VERSION: "1.48"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    command:
      - --label-enable
      - --interval=60
      - --cleanup
